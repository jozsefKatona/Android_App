name: Tunez
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^5.0.0
  spotify_sdk: ^3.0.2
  lottie: ^3.1.0
  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo_headphone_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo_headphone_icon.png
    - assets/logo_headphone.png
    - assets/songs.json
    - assets/vinyl.json
